<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>MiniVault</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Panels -->
        <div id="panels">
            <!-- Notes List -->
            <div class="panel active" id="panel-notes">
                <div id="search-container">
                    <input type="text" id="search-box" placeholder="Volltextsuche...">
                </div>
                <div class="list-actions">
                    <button id="btn-new" class="accent">+ Notiz</button>
                    <button id="btn-daily" class="daily">📅 Heute</button>
                    <button id="btn-export" title="ZIP Export">💾</button>
                    <button id="btn-sync" title="Sync">🔄</button>
                    <select id="sort-select">
                        <option value="name">A-Z</option>
                        <option value="modified">Zuletzt bearbeitet</option>
                        <option value="created">Erstellt</option>
                    </select>
                </div>
                <div id="filter-bar"></div>
                <div id="note-list"></div>
            </div>

            <!-- Mobile Note Editor (always editable on mobile) -->
            <div class="panel" id="panel-mobile-note">
                <div id="mobile-note-toolbar">
                    <button id="btn-mobile-back">← Zurück</button>
                    <span id="mobile-note-title"></span>
                    <button id="btn-mobile-preview" title="Vorschau">👁</button>
                    <button id="btn-mobile-save">💾 Speichern</button>
                </div>
                <div id="mobile-preview"></div>
                <textarea id="mobile-textarea" spellcheck="false" placeholder="Markdown schreiben..."></textarea>
                <div id="mobile-extra">
                    <div id="mobile-toc-section">
                        <div class="mobile-section-title">Gliederung</div>
                        <div id="mobile-toc-list"></div>
                    </div>
                    <div id="mobile-backlinks-section">
                        <div class="mobile-section-title">Backlinks</div>
                        <div id="mobile-backlinks-list"></div>
                    </div>
                </div>
            </div>

            <!-- View (Desktop only) -->
            <div class="panel" id="panel-view">
                <div id="desktop-toolbar">
                    <span class="note-title" id="desktop-note-title">home</span>
                    <button id="btn-edit-desktop">Bearbeiten</button>
                    <button id="btn-graph-desktop">Graph</button>
                </div>
                <div id="viewer"></div>
            </div>

            <!-- Editor (Desktop only) -->
            <div class="panel" id="panel-edit">
                <textarea spellcheck="false" placeholder="Markdown schreiben..."></textarea>
            </div>

            <!-- Backlinks -->
            <div class="panel" id="panel-backlinks">
                <h3>Backlinks</h3>
                <div id="backlinks-list"></div>
            </div>

            <!-- Outline / TOC -->
            <div class="panel" id="panel-outline">
                <h3>Gliederung</h3>
                <div id="outline-list"></div>
            </div>
        </div>

        <!-- Mobile Bottom Navigation -->
        <div id="bottom-nav">
            <button id="nav-notes" class="active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
                Notizen
            </button>
            <button id="nav-view">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Notiz
            </button>
            <button id="nav-backlinks">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
                Links
            </button>
            <button id="nav-outline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h12M4 14h16M4 18h8"/></svg>
                TOC
            </button>
            <button id="nav-graph">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><circle cx="18" cy="6" r="3"/><line x1="8.5" y1="7.5" x2="15.5" y2="16.5"/><line x1="15.5" y1="6" x2="8.5" y2="6"/></svg>
                Graph
            </button>
        </div>
    </div>

    <!-- Graph Overlay -->
    <div id="graph-overlay">
        <button id="graph-close">Schließen</button>
        <div id="graph-container"></div>
    </div>

    <!-- New Note Modal -->
    <div class="modal-overlay" id="new-note-modal">
        <div class="modal">
            <h3>Neue Notiz</h3>
            <label>Name</label>
            <input type="text" id="new-note-name" placeholder="Name der Notiz...">
            <label>Vorlage</label>
            <div class="template-list" id="template-list"></div>
            <div class="modal-actions">
                <button id="btn-create-cancel">Abbrechen</button>
                <button id="btn-create-confirm" class="primary">Erstellen</button>
            </div>
        </div>
    </div>

    <!-- Project Assignment Modal -->
    <div class="modal-overlay" id="project-modal">
        <div class="modal">
            <h3>Projekt zuordnen</h3>
            <label>Projektname</label>
            <input type="text" id="project-name-input" placeholder="Neues oder bestehendes Projekt...">
            <div id="existing-projects" class="template-list"></div>
            <div class="modal-actions">
                <button id="btn-project-remove" style="color:var(--accent)">Entfernen</button>
                <button id="btn-project-cancel">Abbrechen</button>
                <button id="btn-project-confirm" class="primary">Zuordnen</button>
            </div>
        </div>
    </div>

    <!-- Sync Settings Modal -->
    <div class="modal-overlay" id="sync-modal">
        <div class="modal">
            <h3>🔄 Sync-Einstellungen</h3>
            <label>GitHub Personal Access Token</label>
            <input type="password" id="sync-token" placeholder="ghp_...">
            <p class="sync-hint">Benötigt den Scope <strong>gist</strong>. Erstelle einen Token unter GitHub → Settings → Developer settings → Personal access tokens.</p>
            <div id="sync-status-info"></div>
            <div class="modal-actions">
                <button id="btn-sync-cancel">Abbrechen</button>
                <button id="btn-sync-save" class="primary">Speichern</button>
            </div>
            <div class="modal-actions" style="margin-top:6px;">
                <button id="btn-sync-now" style="background:var(--bg-tertiary);">Jetzt synchronisieren</button>
                <button id="btn-sync-disconnect" style="color:var(--accent);background:var(--bg-tertiary);">Trennen</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
